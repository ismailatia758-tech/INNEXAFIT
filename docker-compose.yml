version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: innexafit-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-innexafit_production_secret_2026_xyz789}
      - DATABASE_URL=${DATABASE_URL:-postgresql://neondb_owner:npg_O6KvlLhPsf4b@ep-green-forest-aqffuv4v-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: innexafit-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      - PORT=3000
